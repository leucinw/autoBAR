# parmOPT.py settings
# Existing settings
parameters:   AMOEBAplus_Org.prm
expt_hfe:     -6.0              # experimental hydration free energy (kcal/mol)
opt_params:   "vdwpair-401-402 3.8 0.05"
params_range: "0.3 0.02"

# Density target (new)
expt_density:   0.879           # experimental neat liquid density (g/cm³)
hfe_weight:     1.0             # weight for HFE residual in least-squares
density_weight: 1.0             # weight for density residual in least-squares

# Liquid MD setup (new)
liquid_dir:   "./liquid"        # directory containing liquid.xyz, liquid.key, liquid.sh
liquid_key:   "liquid"          # key file base name (without .key extension)
temperature:  298.15            # MD temperature (K); must match liquid.sh
n_equil:      200               # frames to discard as equilibration
n_production: 800               # production frames used for density and Jacobian
