# =============================================================================
# parmOPT.py settings template
# =============================================================================
# Copy this file to your working directory and rename it settings.yaml.
# Lines beginning with "#" are comments and are ignored.

# --- Required: force field and target ---
parameters:   AMOEBAplus_Org.prm          # Tinker parameter file (.prm)
expt_hfe:     -6.0                        # Experimental HFE (kcal/mol)

# opt_params / params_range: one string optimizes a single parameter group;
# a YAML list optimizes multiple groups simultaneously.
# Use 0 in params_range to fix a parameter (excluded from optimizer, written unchanged).
#
# Single-group form (string):
opt_params:   "vdwpair-401-402 3.8 0.05" # term_key  initial_p1  initial_p2 ...
params_range: "0.3 0"                     # 0.3 range on R; epsilon fixed at 0.05
#
# Multi-group form (list) — uncomment and replace the two lines above:
# opt_params:
#   - "vdw-401    3.80 0.050"   # R and epsilon on atom type 401
#   - "vdw-402    3.60 0.060"   # R and epsilon on atom type 402
#   - "chgpen-403 5.00 0.800"   # chgpen params on atom type 403
# params_range:
#   - "0.30 0"      # optimize R only; epsilon fixed
#   - "0.30 0.02"   # optimize both R and epsilon
#   - "0.50 0.05"   # optimize both chgpen params

# --- Required: density target ---
# Single-temperature form (scalar):
temperature:    298.15    # Simulation temperature (K)
expt_density:   789.0     # Experimental neat-liquid density at that temperature (kg/m³)
                          # NOTE: units are kg/m³ (e.g. ethanol ≈ 789, water ≈ 997)

# Multi-temperature form (list) — comment out the two scalar keys above and
# uncomment the three list keys below to fit densities at multiple temperatures.
# Each density_weight is divided by n_temps internally, so the aggregate
# HFE/density balance is the same regardless of how many temperatures you use.
# temperatures:    [278.15, 298.15, 318.15]   # list of simulation temperatures (K)
# expt_densities:  [802.3,  789.0,  774.8]    # matching experimental densities (kg/m³)
# density_weights: [1.0,    1.0,    1.0]       # per-temperature weights (optional)

# --- Weights and scale normalization ---
# The optimizer minimises: (hfe_weight·ΔHFE/hfe_denom)² + Σ(density_weight_i·Δρ_i/density_denom)²
#
# Denominators normalize physical units → dimensionless residuals (ForceBalance convention).
# Defaults are computed automatically from the experimental target values:
#   hfe_denom     default = sqrt(|expt_hfe|)           e.g. expt_hfe=-5 → denom≈2.24 kcal/mol
#   density_denom default = sqrt(|expt_density|)       e.g. expt_density=997 → denom≈31.6 kg/m³
#                         = std_dev(expt_densities)    when multiple temperatures are given
# With the defaults, hfe_weight=density_weight=1.0 gives balanced optimization out of the box.
# Override denom only to fix the normalization scale across multiple runs.
#
# Weights control relative importance *after* normalization.  Increase the weight of a
# property if the optimizer consistently sacrifices it.  A factor-of-2 weight change
# shifts the cost ratio by 4×.  Monitor the WtNormRes column in parmOPT.log each step.
hfe_weight:     1.0       # relative importance of HFE (default: 1.0)
density_weight: 1.0       # relative importance of density (scalar; ignored when
                          # density_weights list is provided)
# hfe_denom:    2.24      # kcal/mol — override auto-computed default (sqrt(|expt_hfe|))
# density_denom: 31.6     # kg/m³   — override auto-computed default (sqrt(|expt_density|)
                          #           or std_dev of expt_densities for multi-T)

# --- Liquid MD setup ---
liquid_dir:   neat_liquid  # Directory for neat-liquid MD files.
                           # MUST NOT be "liquid" — autoBAR uses ./liquid/ for HFE windows.
liquid_base:  neat_liq     # Coordinate/trajectory base name inside liquid_dir (default: neat_liq)
liquid_key:   neat_liq     # Key file basename inside liquid_dir (default: same as liquid_base)
# hfe_liquid_key: /path/to/hfe.key  # Optional HFE key to derive the neat-liquid key from;
                                    # defaults to <autobar_repo>/dat/liquid.key

equil_time:      0.02       # Equilibration time (ns) — frames discarded before averaging
production_time: 0.08       # Production time (ns) — frames used for density and Jacobian

# --- Liquid MD parameters (shared with autoBAR HFE settings; liquid.sh is auto-generated) ---
liquid_md_time_step:  2.0   # Integration timestep (fs)
liquid_md_write_freq: 0.1   # Trajectory output interval (ps)
liquid_md_pressure:   1.0   # Pressure (atm)
